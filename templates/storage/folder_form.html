{% extends 'base.html' %}

{% block title %}{{ action }} Folder - CloudStorage Manager{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow mb-4">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-primary">{{ action }} Folder</h6>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Folder Name</label>
                            {{ form.name }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Parent Folder (Optional)</label>
                            {{ form.parent }}
                            <div class="form-text">Leave empty to create in root</div>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">{{ action }} Folder</button>
                            <a href="{% url 'storage:file_list' %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
